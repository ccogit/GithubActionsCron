version: '3.8'

services:
  stock-watcher-stream:
    build: .
    container_name: stock-watcher-stream
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE: ${SUPABASE_SERVICE_ROLE}
      ALPACA_KEY: ${ALPACA_KEY}
      ALPACA_SECRET: ${ALPACA_SECRET}
      ALPACA_ENDPOINT: ${ALPACA_ENDPOINT:-https://paper-api.alpaca.markets/v2}
      RESEND_API_KEY: ${RESEND_API_KEY}
      ALERT_EMAIL: ${ALERT_EMAIL:-christopher.ridder@googlemail.com}
    restart: unless-stopped
    # For local testing with local Supabase, uncomment:
    # networks:
    #   - supabase
