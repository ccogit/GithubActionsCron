name: Refresh Analyst Cache

on:
  schedule:
    # Run every hour at minute 0
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  refresh-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Call analyst cache API
        run: |
          RESPONSE=$(curl -sL -w "\n%{http_code}" -X POST https://${{ secrets.DEPLOYMENT_URL }}/api/cache-analyst \
            -H "Authorization: Bearer ${{ secrets.ANALYST_CACHE_KEY }}" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "✗ API call failed with status $HTTP_CODE"
            exit 1
          fi

          echo "✓ Analyst cache refreshed successfully"
