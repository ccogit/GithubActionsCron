name: Refresh Analyst Cache

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  refresh-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install requests "supabase>=2.15.0"

      - name: Refresh analyst cache
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
        run: python worker/refresh_analyst_cache.py
    steps:
      - name: Call analyst cache API
        run: |
          curl -X POST https://${{ secrets.DEPLOYMENT_URL }}/api/cache-analyst \
            -H "Authorization: Bearer ${{ secrets.ANALYST_CACHE_KEY }}" \
            -H "Content-Type: application/json"

      - name: Log result
        if: success()
        run: echo "✓ Analyst cache refreshed successfully"

      - name: Handle failure
        if: failure()
        run: |
          echo "✗ Failed to refresh analyst cache"
          exit 1