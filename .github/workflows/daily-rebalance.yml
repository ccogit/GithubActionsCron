name: Daily Rebalance

# Fires Mon-Fri at 14:00 Europe/Berlin
# Orchestrates refresh → rebalance sequence without hour validation
#
# Skips the refresh phase if signals were already refreshed within the last hour.
#
# Required GitHub Actions secrets:
#   REBALANCE_API_URL  Public URL of the deployed Next.js app's rebalance
#                      endpoint, e.g. https://your-app.vercel.app/api/rebalance

on:
  schedule:
    - cron: '0 12 * * 1-5'  # 14:00 CEST (March-October)
    - cron: '0 13 * * 1-5'  # 14:00 CET  (October-March)
  workflow_dispatch:

permissions:
  actions: write

jobs:
  trigger-refreshes:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check last refresh age
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          last_run=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow refresh-analyst-cache.yml \
            --status completed \
            --limit 1 \
            --json updatedAt \
            --jq '.[0].updatedAt // empty')

          if [ -z "$last_run" ]; then
            echo "No previous refresh found — will refresh"
            echo "SKIP_REFRESH=false" >> "$GITHUB_ENV"
          else
            last_ts=$(date -d "$last_run" +%s)
            now_ts=$(date +%s)
            age_secs=$((now_ts - last_ts))
            age_min=$((age_secs / 60))

            if [ "$age_secs" -lt 3600 ]; then
              echo "Last refresh ${age_min}m ago (< 1 hour) — skipping refresh, rebalancing directly"
              echo "SKIP_REFRESH=true" >> "$GITHUB_ENV"
            else
              echo "Last refresh ${age_min}m ago (> 1 hour) — refreshing first"
              echo "SKIP_REFRESH=false" >> "$GITHUB_ENV"
            fi
          fi

      - name: Trigger all refresh workflows
        if: env.SKIP_REFRESH != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          workflows=(
            "refresh-analyst-cache.yml"
            "refresh-analyst-ratings.yml"
            "refresh-technical-signals.yml"
            "refresh-short-interest.yml"
            "refresh-earnings-signals.yml"
            "refresh-economic-indicators.yml"
            "refresh-index-constituents.yml"
            "refresh-insider-signals.yml"
            "refresh-options-flow.yml"
            "refresh-politician-trades.yml"
            "refresh-social-sentiment.yml"
            "enrich-politician-signals.yml"
          )

          for workflow in "${workflows[@]}"; do
            echo "Triggering $workflow..."
            gh workflow run "$workflow" --repo "$GITHUB_REPOSITORY" --ref main
          done

          # Give GitHub a few seconds to register the runs
          sleep 8

          run_ids=""
          for workflow in "${workflows[@]}"; do
            run_id=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow "$workflow" --limit 1 --json databaseId --jq '.[0].databaseId')
            echo "  $workflow -> run $run_id"
            run_ids="$run_ids $run_id"
          done
          echo "REFRESH_RUN_IDS=$run_ids" >> "$GITHUB_ENV"

      - name: Wait for all refresh workflows to complete
        if: env.SKIP_REFRESH != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_ids=($REFRESH_RUN_IDS)
          max_wait=900  # 15 minutes
          interval=5    # Check every 5 seconds
          elapsed=0
          failed_runs=""

          while [ $elapsed -lt $max_wait ]; do
            all_done=true

            for run_id in "${run_ids[@]}"; do
              conclusion=$(gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --json conclusion --jq '.conclusion')
              if [ -z "$conclusion" ] || [ "$conclusion" == "null" ]; then
                all_done=false
              else
                if [ "$conclusion" != "success" ]; then
                  failed_runs="$failed_runs $run_id ($conclusion)"
                fi
              fi
            done

            if [ "$all_done" = true ]; then
              if [ -z "$failed_runs" ]; then
                echo "All refresh workflows completed successfully!"
              else
                echo "::error::Some refresh workflows failed:$failed_runs"
                exit 1
              fi
              break
            fi

            sleep $interval
            elapsed=$((elapsed + interval))
          done

          if [ $elapsed -ge $max_wait ]; then
            echo "::error::Refresh workflows did not complete within 15 minutes"
            exit 1
          fi

  rebalance:
    needs: trigger-refreshes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger rebalance
        env:
          REBALANCE_URL: ${{ secrets.REBALANCE_API_URL }}
        run: |
          if [ -z "$REBALANCE_URL" ]; then
            echo "::error::REBALANCE_API_URL secret is not set"
            exit 1
          fi
          echo "POST $REBALANCE_URL"
          curl --fail-with-body --show-error --silent \
            -X POST "$REBALANCE_URL" \
            -H "Content-Type: application/json" \
            -d '{"scheduled":true}' \
            -o response.json
          echo "--- Response ---"
          cat response.json
