name: Refresh Technical Signals

# Computes RSI(14), SMA50/200 crossover, and MACD histogram from yfinance
# price history and combines them into a buy/neutral/sell verdict per symbol.
# Runs daily on weekdays after US markets close. No API key required.
#
# Required secrets: SUPABASE_URL, SUPABASE_SERVICE_ROLE

on:
  schedule:
    - cron: '0 22 * * 1-5'   # Weekdays 22:00 UTC (after US market close)
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install yfinance numpy pandas "supabase>=2.15.0"

      - name: Refresh technical signals
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
        run: python worker/refresh_technical_signals.py
