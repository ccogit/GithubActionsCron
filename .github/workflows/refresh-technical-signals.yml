name: Refresh Technical Signals

# Fetches Finnhub aggregate technical-indicator signal (buy/neutral/sell)
# combining RSI, MACD, STOCH, SMA, EMA, Bollinger Bands, Williams %R.
# Runs daily on weekdays after US markets close in Europe.
#
# Required secrets: SUPABASE_URL, SUPABASE_SERVICE_ROLE, FINNHUB_API_KEY

on:
  schedule:
    - cron: '0 22 * * 1-5'   # Weekdays 22:00 UTC (after US market close)
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install requests "supabase>=2.15.0"

      - name: Refresh technical signals
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python worker/refresh_technical_signals.py
