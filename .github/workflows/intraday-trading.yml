name: Intraday Trading

# Runs every minute via repository_dispatch type 'tick'  (same event as the
# price-tick worker — piggybacking on the existing cron-job.org webhook).
#
# Execution order per run:
#   1. Breakout strategy   — pattern-specific entries (20d-high + volume)
#   2. VWAP strategy       — pattern-specific entries (crossover + volume)
#   3. Mean Reversion      — pattern-specific entries (VWAP gap + RSI oversold)
#   4. Portfolio Manager   — deploys remaining cash to top intraday-scored stocks;
#                            also manages exits for its own positions
#
# Strategies run first so they get first pick on specific patterns.
# The portfolio manager then fills any remaining capacity with the best-
# scoring stocks according to the intraday attractiveness model.
#
# All four workers use the SAME intraday attractiveness score
# (worker/intraday_attractiveness.py) and the SAME Alpaca paper account
# (INTRADAY_ALPACA_KEY / INTRADAY_ALPACA_SECRET).  Neither reads the main
# portfolio's Supabase signal tables.
#
# Maximum simultaneous positions: 20 (enforced globally by intraday_shared.py).
#
# Required secrets:
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE
#   INTRADAY_ALPACA_KEY, INTRADAY_ALPACA_SECRET

on:
  repository_dispatch:
    types: [tick]   # fires every minute from cron-job.org
  schedule:
    - cron: '*/5 13-21 * * 1-5'   # fallback: every 5 min during market hours
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 4   # hard kill before next tick fires

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install "supabase>=2.15.0"

      # ── Strategy workers (pattern-specific) ──────────────────────────────

      - name: Breakout + Volume Confirmation
        working-directory: worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          INTRADAY_ALPACA_KEY: ${{ secrets.INTRADAY_ALPACA_KEY }}
          INTRADAY_ALPACA_SECRET: ${{ secrets.INTRADAY_ALPACA_SECRET }}
        run: python intraday_breakout.py

      - name: VWAP Strategy
        working-directory: worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          INTRADAY_ALPACA_KEY: ${{ secrets.INTRADAY_ALPACA_KEY }}
          INTRADAY_ALPACA_SECRET: ${{ secrets.INTRADAY_ALPACA_SECRET }}
        run: python intraday_vwap.py

      - name: Mean Reversion
        working-directory: worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          INTRADAY_ALPACA_KEY: ${{ secrets.INTRADAY_ALPACA_KEY }}
          INTRADAY_ALPACA_SECRET: ${{ secrets.INTRADAY_ALPACA_SECRET }}
        run: python intraday_mean_reversion.py

      # ── Portfolio manager (score-driven cash deployment) ─────────────────

      - name: Portfolio Manager
        working-directory: worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          INTRADAY_ALPACA_KEY: ${{ secrets.INTRADAY_ALPACA_KEY }}
          INTRADAY_ALPACA_SECRET: ${{ secrets.INTRADAY_ALPACA_SECRET }}
        run: python intraday_portfolio_manager.py
