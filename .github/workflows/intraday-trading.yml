name: Intraday Trading

# Trigger modes
#
#  1. repository_dispatch type 'tick'  (cron-job.org webhook, every minute)
#     → runs ONE cycle immediately.
#
#  2. schedule cron  */5  (GitHub's built-in scheduler, every 5 min)
#     → runs FIVE cycles with ~55 s sleep between them, giving ~minute-level
#        coverage without any external dependency.
#
#  Either trigger alone is sufficient.  When both are active the tick fires
#  every minute (1 cycle) and the cron provides a backup every 5 minutes.
#
# Execution order per cycle:
#   1. Breakout strategy   — pattern entries (20d-high + volume)
#   2. VWAP strategy       — pattern entries (crossover + volume)
#   3. Mean Reversion      — pattern entries (VWAP gap + RSI oversold)
#   4. Portfolio Manager   — deploys remaining cash to top-scored stocks
#
# Required secrets:
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE
#   INTRADAY_ALPACA_KEY, INTRADAY_ALPACA_SECRET

on:
  repository_dispatch:
    types: [tick]         # cron-job.org fires this every minute
  schedule:
    - cron: '*/5 13-20 * * 1-5'   # every 5 min, 9 AM–4 PM ET (fallback)
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install "supabase>=2.15.0"

      - name: Run intraday trading loop
        working-directory: worker
        env:
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          INTRADAY_ALPACA_KEY:   ${{ secrets.INTRADAY_ALPACA_KEY }}
          INTRADAY_ALPACA_SECRET: ${{ secrets.INTRADAY_ALPACA_SECRET }}
        run: |
          # When triggered by 'tick' (every-minute webhook): run 1 cycle.
          # When triggered by the 5-min cron or manually: run 5 cycles × ~55s gaps.
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            CYCLES=1
          else
            CYCLES=5
          fi

          for cycle in $(seq 1 $CYCLES); do
            echo ""
            echo "════════ Cycle $cycle/$CYCLES — $(date -u +%H:%M:%S) UTC ════════"

            echo "── Breakout + Volume Confirmation ─────────────────────────"
            python intraday_breakout.py

            echo "── VWAP Strategy ───────────────────────────────────────────"
            python intraday_vwap.py

            echo "── Mean Reversion ──────────────────────────────────────────"
            python intraday_mean_reversion.py

            echo "── Portfolio Manager ───────────────────────────────────────"
            python intraday_portfolio_manager.py

            echo "── cycle $cycle complete ───────────────────────────────────"

            [ $cycle -lt $CYCLES ] && sleep 55
          done
