name: Refresh Options Flow

on:
  schedule:
    - cron: '45 11 * * 1-5'  # 13:45 CEST (March-October)
    - cron: '45 12 * * 1-5'  # 13:45 CET  (October-March)
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install yfinance supabase pandas
      - name: Refresh options flow
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
        run: python worker/refresh_options_flow.py