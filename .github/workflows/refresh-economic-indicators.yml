name: Refresh Economic Indicators

on:
  schedule:
    - cron: '45 11 * * 1-5'  # 13:45 CEST (March-October)
    - cron: '45 12 * * 1-5'  # 13:45 CET  (October-March)
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install supabase requests
      - run: python worker/refresh_economic_indicators.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
