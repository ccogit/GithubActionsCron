name: Refresh Finnhub Support Resistance

on:
  schedule:
    - cron: '30 6 * * 1-5'  # Weekdays at 6:30 AM UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install requests supabase
      - name: Refresh support/resistance
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python worker/refresh_finnhub_support_resistance.py
