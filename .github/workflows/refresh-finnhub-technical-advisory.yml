name: Refresh Finnhub Technical Advisory

on:
  schedule:
    - cron: '15 6 * * 1-5'  # Weekdays at 6:15 AM UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install yfinance numpy pandas "supabase>=2.15.0"
      - name: Refresh advisory
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
        run: python worker/refresh_finnhub_technical_advisory.py
